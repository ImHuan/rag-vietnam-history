<script>
    const form = document.getElementById("chat-form");
    const input = document.getElementById("question-input");
    const chatBox = document.getElementById("chat-box");

    // Hàm tiện ích để cuộn xuống cuối chat
    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const question = input.value.trim();
        if (!question) return;

        appendUser(question);
        input.value = "";
        scrollToBottom(); // Cuộn ngay sau khi user hỏi

        const loading = document.createElement("div");
        loading.className = "text-left text-gray-400 italic mb-4 animate-pulse";
        loading.textContent = "AI is thinking...";
        chatBox.appendChild(loading);
        scrollToBottom();

        try {
            const res = await fetch("/ask", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ question })
            });

            if (!res.ok) throw new Error("Server response was not ok");
            
            const data = await res.json();
            loading.remove();
            appendBot(data.answer);

        } catch (error) {
            loading.remove();
            appendBot("⚠️ Đã có lỗi xảy ra từ máy chủ.");
        }

        scrollToBottom(); // Cuộn lại lần cuối sau khi bot in câu trả lời
    });

    function appendUser(text){
        const div = document.createElement("div");
        div.className = "text-right mb-4";
        // Thêm break-words để text dài không bị tràn khung
        div.innerHTML = `<span class="bg-blue-600 px-4 py-2 rounded-lg inline-block max-w-[80%] break-words shadow">${text}</span>`;
        chatBox.appendChild(div);
    }

    function appendBot(markdown){
        const div = document.createElement("div");
        div.className = "text-left mb-4";
        // Thêm class 'prose' (nếu dùng plugin) hoặc css cơ bản cho markdown dễ nhìn
        div.innerHTML = `<div class="bg-slate-800 p-4 rounded-lg inline-block max-w-[90%] shadow break-words overflow-x-auto">${marked.parse(markdown)}</div>`;
        chatBox.appendChild(div);
    }
</script>
